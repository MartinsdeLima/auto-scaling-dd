apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-php
  namespace: app-php
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-php
  template:
    metadata:
      labels:
        app: app-php
      annotations:
            ad.datadoghq.com/app-php.check_names: '["http"]'
            ad.datadoghq.com/app-php.init_configs: '[{}]'
            ad.datadoghq.com/app-php.instances: '[{"name":"app-php","url":"http://%%host%%:8089/ping"}]' 
    spec:
      containers:
        - name: app-php
          image: martinslima/app-php:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8089
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "200m"
          env:
            - name: DD_AGENT_HOST
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
            - name: DD_TRACE_AGENT_PORT
              value: "8126"
            - name: DD_SERVICE
              value: "app-php"
            - name: DD_VERSION
              value: "1.0"     
---
apiVersion: v1
kind: Service
metadata:
  name: app-php
  namespace: app-php
spec:
  type: NodePort
  selector:
    app: app-php
  ports:
    - port: 80
      targetPort: 8089
      nodePort: 30080